name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - name: Check format
        run: npm run fmt:check
      - name: Typecheck
        run: npm run tsc
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test run
      - name: Build
        run: npm run build
